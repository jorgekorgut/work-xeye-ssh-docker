services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test
    environment:
      - XAUTH=${XAUTH:?Please source ./docker-x11-forward.sh before launching the container}
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=${XAUTH}
    volumes:
      - ${XAUTH}:${XAUTH}
    networks:
      - ros_network

networks:
  ros_network:
    driver: bridge
